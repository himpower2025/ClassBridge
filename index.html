
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ClassBridge by Himpower</title>
    
    <!-- PWA Manifest & App Store Meta -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Favicon & Touch Icons -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    
    <!-- Mobile Web App & iOS App Store Compliance -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ClassBridge" />
    <meta name="theme-color" content="#4A90E2" />
    <meta name="description" content="ClassBridge - Connecting your school community. Developed by Himpower Pvt. Ltd." />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script>
      // Service Worker Registration for PWA & Store Readiness
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(registration => {
              console.log('[ClassBridge SW] ServiceWorker registered successfully:', registration.scope);
            })
            .catch(err => {
              console.log('[ClassBridge SW] ServiceWorker registration failed:', err);
            });
        });
      }
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
